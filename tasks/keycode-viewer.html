<h2 id="keycode-viewer">Keycode Viewer</h2>

<div id="keycode-container">
    <label for="keycodeTextArea">Ins Textfeld klicken und Tasten drücken:</label>
    <textarea id="keycodeTextArea" rows="8" spellcheck="false"></textarea>
    
    <div>
        <input type="checkbox" id="checkboxCrtl" disabled></input>
        <label for="checkboxCrtl">Strg</label>
        
        <input type="checkbox" id="checkboxShift" disabled></input>
        <label for="checkboxShift">Shift</label>
        
        <input type="checkbox" id="checkboxAlt" disabled></input>
        <label for="checkboxAlt">Alt</label>
        
        <input type="checkbox" id="checkboxMeta" disabled></input>
        <label for="checkboxMeta">Meta</label>
    </div>
</div>
